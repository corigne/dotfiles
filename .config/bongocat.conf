# ═══════════════════════════════════════════════════════════════════════════
# BONGO CAT CONFIG
# ═══════════════════════════════════════════════════════════════════════════

# Visual settings
cat_height=42                    # Size of bongo cat (16-128)
#cat_align=center
cat_x_offset=-350                 # Horizontal position offset
cat_y_offset=0                   # Vertical position offset

enable_antialiasing=1
overlay_height=50
overlay_opacity=0
overlay_position=top
# mirror_x=0
# mirror_y=0

# Animation settings
fps=144                           # Frame rate (1-120)
keypress_duration=100            # Animation duration (ms)
test_animation_interval=0        # Test animation every N seconds (0=off)
# Appearance
# Input device (run bongocat-find-devices to find yours)
keyboard_device=/dev/input/event3
keyboard_device=/dev/input/event8
keyboard_device=/dev/input/event9
keyboard_device=/dev/input/event10
keyboard_name=KBDFans DZ60
keyboard_name=KBDFans DZ60 Keyboard

# Sleep mode (optional)
# idle_sleep_timeout=300
# enable_scheduled_sleep=0
# sleep_begin=22:00
# sleep_end=06:00

# Debug
enable_debug=0                   # Show debug messages
